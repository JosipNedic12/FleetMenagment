filebeat.inputs:
  - type: filestream
    id: fleet-api-logs
    paths:
      - /var/log/fleet/fleet-api-*.json
    parsers:
      - ndjson:
          keys_under_root: true
          add_error_key: true

processors:
  - timestamp:
      field: Timestamp
      layouts:
        - '2006-01-02T15:04:05.9999999-07:00'
        - '2006-01-02T15:04:05.9999999Z07:00'
      test:
        - '2026-03-24T00:47:38.9513773+01:00'

output.elasticsearch:
  hosts: ["elasticsearch:9200"]
  index: "fleet-logs-%{+yyyy.MM.dd}"

setup.ilm.enabled: false
setup.template.name: fleet-logs
setup.template.pattern: "fleet-logs-*"

logging.level: info
logging.to_stderr: true